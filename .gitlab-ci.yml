stages:
- build
- test
variables:
  APP_NAME: my-app
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA
  REGISTRY: $CI_REGISTRY
  REGISTRY_IMAGE: $CI_REGISTRY_IMAGE
build:
  stage: build
  image: docker:24
  services:
  - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: /certs
  script:
  - if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
  - if [ -f setup.py ] || [ -f pyproject.toml ]; then pip install -e .; fi
  - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin
    "$CI_REGISTRY"
  - docker build -t $REGISTRY_IMAGE:$IMAGE_TAG .
  - docker push $REGISTRY_IMAGE:$IMAGE_TAG
  - docker tag $REGISTRY_IMAGE:$IMAGE_TAG $REGISTRY_IMAGE:latest
  - docker push $REGISTRY_IMAGE:latest
  rules:
  - if: $CI_COMMIT_BRANCH
    when: always
test:python:
  stage: test
  image: python:3.11-slim
  script:
  - if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
  - pip install pytest pytest-cov
  - if [ -d tests ] || [ -d test ]; then python -m pytest --cov=./ --cov-report=xml
    -v; fi
  coverage: /TOTAL.*\s+(\d+%)$/
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    when: always
  rules:
  - if: $CI_COMMIT_BRANCH
    when: always
  - if: $CI_MERGE_REQUEST_ID
    when: always
