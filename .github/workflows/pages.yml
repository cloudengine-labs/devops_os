name: Deploy Hugo Documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

# Default shell
defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: "0.147.0"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history for .GitInfo / LastMod

      - name: Setup Go (required for Hugo modules)
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb \
            https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb
          sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Setup GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Download Hugo modules
        working-directory: ./hugo-docs
        run: hugo mod tidy

      - name: Build Hugo site
        working-directory: ./hugo-docs
        env:
          HUGO_ENVIRONMENT: production
          # Use the Pages URL configured above
          HUGO_BASEURL: ${{ steps.pages.outputs.base_url }}/
        run: hugo --gc --minify

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./hugo-docs/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
