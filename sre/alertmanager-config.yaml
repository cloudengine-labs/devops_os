global:
  resolve_timeout: 5m
  slack_api_url: $SLACK_WEBHOOK_URL
route:
  group_by:
  - alertname
  - team
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: platform-slack
  routes:
  - match:
      severity: critical
    receiver: platform-slack
    continue: true
  - match:
      team: platform
    receiver: platform-slack
receivers:
- name: platform-slack
  slack_configs:
  - api_url: $SLACK_WEBHOOK_URL
    channel: '#alerts'
    send_resolved: true
    title: '{{ .GroupLabels.alertname }}'
    text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
inhibit_rules:
- source_match:
    severity: critical
  target_match:
    severity: warning
  equal:
  - alertname
  - team
