apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: my-app-sre-rules
  namespace: default
  labels:
    app: my-app
    team: platform
    prometheus: kube-prometheus
    role: alert-rules
spec:
  groups:
  - name: my-app.availability
    interval: 30s
    rules:
    - alert: My_AppHighErrorRate
      expr: rate(http_requests_total{job="my-app",status=~"5.."}[5m]) / rate(http_requests_total{job="my-app"}[5m])
        > 0.001
      for: 5m
      labels:
        severity: critical
        team: platform
        slo: availability
      annotations:
        summary: High error rate on my-app
        description: 'Error rate for my-app is above 0.1% (SLO target 99.9%). Current
          value: {{ $value | humanizePercentage }}'
        runbook_url: https://wiki.example.com/runbooks/my-app/high-error-rate
    - alert: My_AppSLOBurnRate
      expr: (rate(http_requests_total{job="my-app",status=~"5.."}[1h]) / rate(http_requests_total{job="my-app"}[1h]))
        > 14400.0 * 0.001
      for: 2m
      labels:
        severity: critical
        team: platform
        slo: error-budget
      annotations:
        summary: Error budget burn rate too high for my-app
        description: Error budget for my-app is burning 14400.0x faster than the target
          rate over the last 1h.
  - name: my-app.latency
    interval: 30s
    rules:
    - alert: My_AppHighLatency
      expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket{job="my-app"}[5m]))
        > 0.5
      for: 5m
      labels:
        severity: warning
        team: platform
        slo: latency
      annotations:
        summary: High p99 latency on my-app
        description: 'p99 latency for my-app is above 500ms. Current value: {{ $value
          | humanizeDuration }}'
        runbook_url: https://wiki.example.com/runbooks/my-app/high-latency
    - alert: My_AppLatencyBudgetBurn
      expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket{job="my-app"}[1h]))
        > 1.0
      for: 15m
      labels:
        severity: critical
        team: platform
        slo: latency
      annotations:
        summary: Latency budget burning fast for my-app
        description: p99 latency for my-app has been above 1000ms for 15 minutes.
  - name: my-app.infrastructure
    rules:
    - alert: My_AppPodRestartingFrequently
      expr: rate(kube_pod_container_status_restarts_total{namespace="default",pod=~"my-app-.*"}[15m])
        * 60 > 0.1
      for: 5m
      labels:
        severity: warning
        team: platform
      annotations:
        summary: Pod my-app is restarting frequently
        description: Pod has restarted more than once in the last 15 minutes.
    - alert: My_AppDeploymentReplicasMismatch
      expr: kube_deployment_spec_replicas{namespace="default",deployment="my-app"}
        != kube_deployment_status_replicas_available{namespace="default",deployment="my-app"}
      for: 10m
      labels:
        severity: warning
        team: platform
      annotations:
        summary: Deployment my-app does not have the desired number of replicas
        description: Available replicas don't match desired replicas for 10 minutes.
