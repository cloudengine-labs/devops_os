version: prometheus/v1
service: my-app
labels:
  owner: platform
  repo: https://github.com/myorg/my-app
slos:
- name: availability
  description: "my-app availability SLO \u2014 99.9% of requests succeed"
  objective: 99.9
  sli:
    events:
      error_query: rate(http_requests_total{job="my-app",status=~"(5..)"}[{{.window}}])
      total_query: rate(http_requests_total{job="my-app"}[{{.window}}])
  alerting:
    name: My-AppAvailabilitySLO
    labels:
      team: platform
    annotations:
      runbook: https://wiki.example.com/runbooks/my-app/availability
    page_alert:
      labels:
        severity: critical
    ticket_alert:
      labels:
        severity: warning
- name: latency
  description: "my-app latency SLO \u2014 99.9% of requests complete within 500ms"
  objective: 99.9
  sli:
    events:
      error_query: (rate(http_request_duration_seconds_count{job="my-app"}[{{.window}}])
        - rate(http_request_duration_seconds_bucket{job="my-app",le="0.5"}[{{.window}}]))
      total_query: rate(http_request_duration_seconds_count{job="my-app"}[{{.window}}])
  alerting:
    name: My-AppLatencySLO
    labels:
      team: platform
    page_alert:
      labels:
        severity: critical
    ticket_alert:
      labels:
        severity: warning
